# Triggered after all four payload chunks were present.
name: Apply rebuild pass 06

on:
  push:
    branches:
      - rebuild/mega-room-40pass
    paths:
      - tools/pass06_payload_*.b64
      - .github/workflows/apply-pass06.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out rebuild branch
        uses: actions/checkout@v4
        with:
          ref: rebuild/mega-room-40pass
          fetch-depth: 0

      - name: Reassemble pass 06 payload
        shell: bash
        run: |
          cat tools/pass06_payload_*.b64 > /tmp/pass06.b64
          base64 --decode /tmp/pass06.b64 > /tmp/pass06.tar.gz
          tar -xzf /tmp/pass06.tar.gz -C .

      - name: Check JavaScript syntax
        run: node --check src/main.js

      - name: Run isolated runtime smoke test
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const vm = require('vm');
          const noop = () => {};
          const gradient = { addColorStop: noop };
          const ctx = new Proxy({
            createLinearGradient: () => gradient,
            createRadialGradient: () => gradient,
            measureText: text => ({ width: String(text).length * 7 })
          }, {
            get(target, key) { return key in target ? target[key] : noop; },
            set(target, key, value) { target[key] = value; return true; }
          });
          const canvas = { width: 1200, height: 680, getContext: () => ctx, addEventListener: noop, focus: noop };
          const elements = {
            gameCanvas: canvas,
            buildStatus: { textContent: '', dataset: {} },
            auditStatus: { textContent: '', dataset: {} }
          };
          const sandbox = {
            console,
            Math,
            performance: { now: () => 0 },
            document: { getElementById: id => elements[id] },
            window: { addEventListener: noop },
            requestAnimationFrame: noop,
            setTimeout,
            clearTimeout
          };
          sandbox.window.window = sandbox.window;
          sandbox.window.document = sandbox.document;
          vm.createContext(sandbox);
          vm.runInContext(fs.readFileSync('src/main.js', 'utf8'), sandbox, { filename: 'src/main.js' });
          const api = sandbox.window.__corelessRebuild;
          if (!api) throw new Error('runtime API missing');
          if (api.build.pass !== 6) throw new Error(`expected pass 6, got ${api.build.pass}`);
          if (!api.audit.passed || api.audit.checks.length !== 13) throw new Error('pass 06 audit failed');
          api.playtest.setCheckpoint('cp_arena_entry');
          const started = api.playtest.startArena();
          if (started.room !== 'arena') throw new Error('arena room did not initialize');
          if (started.enemies.length !== 2 || started.arena.wave !== 1) throw new Error('arena wave 1 did not spawn correctly');
          console.log(JSON.stringify({ pass: api.build.pass, audit: api.audit.checks.length, wave: started.arena.wave, enemies: started.enemies.length }));
          NODE

      - name: Remove transfer-only files
        run: rm -f tools/pass06_payload_*.b64 .github/workflows/apply-pass06.yml

      - name: Commit verified pass 06
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: implement rebuild pass 06 combat arena [skip ci]"
          git push origin HEAD:rebuild/mega-room-40pass
