name: Pass 08 Browser Verify

on:
  push:
    branches:
      - rebuild/mega-room-40pass
    paths:
      - index.html
      - src/pass08.js
      - .github/workflows/pass08-browser-verify.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: rebuild/mega-room-40pass

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 --no-save
          npx playwright install chromium

      - name: Start local server
        run: |
          python3 -m http.server 4173 > /tmp/pass08-http.log 2>&1 &
          echo $! > /tmp/pass08-http.pid
          sleep 2

      - name: Run real browser checks
        run: |
          mkdir -p browser-artifacts
          cat > /tmp/pass08-verify.mjs <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 1000 }, deviceScaleFactor: 1 });
          const consoleErrors = [];
          const pageErrors = [];
          page.on('console', message => {
            if (message.type() === 'error') consoleErrors.push(message.text());
          });
          page.on('pageerror', error => pageErrors.push(String(error)));

          await page.goto('http://127.0.0.1:4173/index.html', { waitUntil: 'networkidle' });
          await page.waitForTimeout(1200);
          await page.keyboard.press('F8');
          await page.waitForTimeout(700);

          const entry = await page.evaluate(() => ({
            title: document.title,
            buildStatus: document.getElementById('buildStatus')?.textContent ?? null,
            auditStatus: document.getElementById('auditStatus')?.textContent ?? null,
            canvas: (() => {
              const canvas = document.getElementById('gameCanvas');
              return canvas ? { width: canvas.width, height: canvas.height, rect: canvas.getBoundingClientRect().toJSON() } : null;
            })(),
            corelessGlobals: Object.keys(window).filter(key => /coreless|snake|pass08/i.test(key)).sort(),
          }));
          fs.writeFileSync('browser-artifacts/entry.json', JSON.stringify(entry, null, 2));
          await page.screenshot({ path: 'browser-artifacts/01-entry.png', fullPage: true });

          await page.keyboard.down('d');
          for (let segment = 0; segment < 9; segment += 1) {
            if ([1, 2, 4, 6, 7].includes(segment)) await page.keyboard.press('Space');
            if ([3, 6, 8].includes(segment)) await page.keyboard.press('Shift');
            await page.waitForTimeout(650);
            await page.screenshot({ path: `browser-artifacts/step-${String(segment + 1).padStart(2, '0')}.png`, fullPage: true });
          }
          await page.keyboard.up('d');

          for (let i = 0; i < 6; i += 1) {
            await page.keyboard.down(i % 2 === 0 ? 'a' : 'd');
            await page.keyboard.press('Space');
            await page.waitForTimeout(250);
            await page.keyboard.up(i % 2 === 0 ? 'a' : 'd');
          }
          await page.waitForTimeout(500);
          await page.screenshot({ path: 'browser-artifacts/11-wall-jump-attempt.png', fullPage: true });

          const finalState = await page.evaluate(() => {
            const globals = Object.keys(window).filter(key => /coreless|snake|pass08/i.test(key)).sort();
            const exposed = {};
            for (const key of globals) {
              try {
                const value = window[key];
                if (value && typeof value === 'object') exposed[key] = Object.keys(value).slice(0, 50);
                else exposed[key] = typeof value;
              } catch (error) {
                exposed[key] = `error:${error}`;
              }
            }
            return {
              buildStatus: document.getElementById('buildStatus')?.textContent ?? null,
              auditStatus: document.getElementById('auditStatus')?.textContent ?? null,
              globals,
              exposed,
            };
          });

          fs.writeFileSync('browser-artifacts/results.json', JSON.stringify({
            entry,
            finalState,
            consoleErrors,
            pageErrors,
          }, null, 2));
          await browser.close();

          if (consoleErrors.length || pageErrors.length) {
            console.error(JSON.stringify({ consoleErrors, pageErrors }, null, 2));
            process.exitCode = 1;
          }
          NODE
          node /tmp/pass08-verify.mjs

      - name: Upload screenshots and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pass08-browser-verify
          path: browser-artifacts
          if-no-files-found: error
