name: Rebuild V2 Browser Verify

on:
  push:
    branches:
      - rebuild/mega-room-40pass
    paths:
      - index.html
      - style.css
      - src/v2/**
      - .github/workflows/rebuild-v2-browser-verify.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out rebuild branch
        uses: actions/checkout@v4
        with:
          ref: rebuild/mega-room-40pass

      - name: Install Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.52.0 --no-save
          npx playwright install chromium

      - name: Start local server
        run: |
          python3 -m http.server 4173 >/tmp/coreless-v2-http.log 2>&1 &
          sleep 2

      - name: Verify pass 15
        run: |
          mkdir -p browser-artifacts
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          import fs from 'node:fs';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1440, height: 900 } });
          const consoleErrors = [];
          const pageErrors = [];
          page.on('console', message => {
            if (message.type() === 'error') consoleErrors.push(message.text());
          });
          page.on('pageerror', error => pageErrors.push(String(error)));

          await page.goto('http://127.0.0.1:4173/index.html', { waitUntil: 'networkidle' });
          await page.waitForTimeout(700);
          await page.locator('#gameCanvas').focus();
          for (const key of ['d', 'Space', 'Shift', 'a', 'e', 'b', 'b']) {
            await page.keyboard.press(key);
            await page.waitForTimeout(80);
          }

          const result = await page.evaluate(() => ({
            title: document.title,
            activeElement: document.activeElement?.id ?? null,
            audit: window.__corelessV2?.audit?.() ?? null,
          }));
          result.consoleErrors = consoleErrors;
          result.pageErrors = pageErrors;

          fs.writeFileSync('browser-artifacts/pass15-results.json', JSON.stringify(result, null, 2));
          await page.screenshot({ path: 'browser-artifacts/pass15-collapsing-bridge.png', fullPage: true });
          await browser.close();

          const required = ['KeyA', 'KeyB', 'KeyD', 'KeyE', 'ShiftLeft', 'Space'];
          const used = result.audit?.inputProbe?.usedCodes ?? [];
          if (
            result.title !== 'Coreless · Rebuild V2 · Pass 15' ||
            result.activeElement !== 'gameCanvas' ||
            result.audit?.passed !== true ||
            result.audit?.blueprint?.passed !== true ||
            result.audit?.blueprint?.passedCount !== 18 ||
            result.audit?.pass03?.passed !== true ||
            result.audit?.pass03?.passedCount !== 20 ||
            result.audit?.pass04?.passed !== true ||
            result.audit?.pass04?.passedCount !== 22 ||
            result.audit?.pass05?.passed !== true ||
            result.audit?.pass05?.passedCount !== 25 ||
            result.audit?.pass06?.passed !== true ||
            result.audit?.pass06?.passedCount !== 28 ||
            result.audit?.pass07?.passed !== true ||
            result.audit?.pass07?.passedCount !== 28 ||
            result.audit?.pass08?.passed !== true ||
            result.audit?.pass08?.passedCount !== 24 ||
            result.audit?.pass09?.passed !== true ||
            result.audit?.pass09?.passedCount !== 28 ||
            result.audit?.pass10?.passed !== true ||
            result.audit?.pass10?.passedCount !== 30 ||
            result.audit?.pass11?.passed !== true ||
            result.audit?.pass11?.passedCount !== 31 ||
            result.audit?.pass12?.passed !== true ||
            result.audit?.pass12?.passedCount !== 32 ||
            result.audit?.pass13?.passed !== true ||
            result.audit?.pass13?.passedCount !== 37 ||
            result.audit?.pass14?.passed !== true ||
            result.audit?.pass14?.passedCount !== 43 ||
            result.audit?.pass15?.passed !== true ||
            result.audit?.pass15?.passedCount !== 29 ||
            result.audit?.gameplay?.blueprintVisible !== false ||
            !required.every(code => used.includes(code)) ||
            consoleErrors.length ||
            pageErrors.length
          ) {
            console.error(JSON.stringify(result, null, 2));
            process.exitCode = 1;
          }
          NODE

      - name: Upload browser artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rebuild-v2-pass15-browser
          path: browser-artifacts
          if-no-files-found: error
