<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 03</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass03">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>3차 — 벽점프 수직축 실제 플레이 구역</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동 · Space 점프 · Shift/K 대시 · R 체크포인트 복귀 · F1 전체 경로 · F2 검증표</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 3차 실제 게임 화면"></canvas>
    <section class="notes"><strong>3차 목표:</strong> 2차 실제 화면에서 발견한 카메라 전환, 체크포인트 겹침, 하단 안내판의 장애물 가림을 수정하고, 세 번째 벽점프 수직축을 실제 충돌·벽 미끄러짐·벽점프·수직 카메라로 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass03"></script>
</body>
</html>
