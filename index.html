<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 09</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass09">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>9차 — 장거리 붕괴석 추격전</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동 · Space 점프 · Shift/K 대시 · R 체크포인트 재시작 · F2 검증표 · F8 8차 검사 · F9 9차 검사</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 9차 실제 게임 화면"></canvas>
    <section class="notes"><strong>9차 목표:</strong> 8차 준비 구간 뒤에서 하나의 구불구불한 경사를 따라 장거리 붕괴석 추격전을 진행합니다. 플레이어는 잔해를 점프로 넘고, 붕괴석은 잔해를 파괴하며 잠시 감속합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass07"></script>
  <script src="src/pass08.js?v=rebuild-pass08"></script>
  <script src="src/pass09.js?v=rebuild-pass09"></script>
</body>
</html>
