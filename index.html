<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 07</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass07">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>7차 — 승강 전투 통로 실제 플레이 구역</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동·스윙 가속 · Space 점프/집게 해제 · E 집게 · J/X 근접 공격 · Shift/K 대시 · 밟기 · R 체크포인트 · F1 경로 · F2 검증표</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 7차 실제 게임 화면"></canvas>
    <section class="notes"><strong>7차 목표:</strong> 6차에서 확인된 적 겹침과 연속 접촉 피해를 수정하고, 수평·수직 이동 발판과 세 종류의 적이 한 경로에 결합된 승강 전투 통로를 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass07"></script>
</body>
</html>
