<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 02</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass02">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>2차 — 이동 도입·정밀 점프 실제 플레이 구역</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동 · Space 점프 · Shift/K 대시 · R 체크포인트 복귀 · F1 전체 경로 · F2 검증표</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 2차 실제 게임 화면"></canvas>
    <section class="notes"><strong>2차 목표:</strong> 1차 화면의 글자 확대·겹침과 검증표 가림 문제를 수정하고, 첫 두 구역을 실제 충돌·카메라·체크포인트·가시 피해가 작동하는 단일 경로로 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass02"></script>
</body>
</html>
