<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 08V</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass08v">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>8차 재검증 — 하강 스네이크 추격</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">7차 구역 실행 중…</span>
        <span id="auditStatus">F8로 8차 검사</span>
      </div>
    </header>
    <p class="controls">A/D 이동 · Space 점프·벽점프·점프 강도 조절 · Shift/K 대시 · R 체크포인트 재시작 · F8 8차 즉시 진입</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재검증 8차 하강 스네이크 추격"></canvas>
    <section class="notes"><strong>8차 수정 목표:</strong> 위에서 아래로 내려가는 완곡한 스네이크 경로, 울퉁불퉁한 오르막·내리막, 형태가 다른 파괴 미로벽 9개, 연속 벽점프, 대시 전용 가시밭 2개, 점프 강도 조절 파쿠르를 결합합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass07"></script>
  <script src="src/pass08.js?v=rebuild-pass08v"></script>
</body>
</html>
