<!DOCTYPE html>
<html lang="ko">

<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>8차 재제작 — 하강 스네이크 추격 훈련</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">7차 구역 실행 중…</span>

  </main>
