<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 05</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass05">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>5차 — 벽면 터렛 회랑 실제 플레이 구역</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동·스윙 가속 · Space 점프/집게 해제 · E 집게 · Shift/K 대시 · 포탄 밟기 · R 체크포인트 · F1 경로 · F2 검증표</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 5차 실제 게임 화면"></canvas>
    <section class="notes"><strong>5차 목표:</strong> 4차 집게 구역의 과도한 잡기 범위 표시와 경로선 가림을 수정하고, 벽·천장에 고정되어 플레이어를 추적 조준하는 터렛 회랑과 포탄 회피·밟기 구간을 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass05"></script>
</body>
</html>
