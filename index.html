<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 06</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass06">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>6차 — 전투 경기장 실제 플레이 구역</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동·스윙 가속 · Space 점프/집게 해제 · E 집게 · J/X 근접 공격 · Shift/K 대시 · 밟기 · R 체크포인트 · F1 경로 · F2 검증표</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 6차 실제 게임 화면"></canvas>
    <section class="notes"><strong>6차 목표:</strong> 5차 터렛의 실제 고정 구조와 플레이어 가시성을 보완하고, 캐릭터와 비슷하거나 약간 큰 적들만 등장하는 넓은 3파동 전투 경기장을 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass06"></script>
</body>
</html>
