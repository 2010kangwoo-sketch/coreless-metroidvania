<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 01</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass01">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>1차 — 단일 경로 구조·이동 기준 확정</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">초기화 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>

    <p class="controls">
      F1 전체 설계도/이동 시험실 · A/D 이동 · Space 점프 · Shift 대시 · R 위치 초기화 · F2 검증표
    </p>

    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 1차 설계 화면"></canvas>

    <section class="notes">
      <strong>1차 목표:</strong>
      기존 16차 실행 구조를 사용하지 않고, 하나의 기준 파일에서 단일 루트·캐릭터 기준 수치·카메라 단위·자동 통과성 검사를 새로 확정합니다.
    </section>
  </main>
  <script src="src/main.js?v=rebuild-pass01"></script>
</body>
</html>
