<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 04</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass04">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>4차 — 집게·클로 횡단 실제 플레이 구역</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동·스윙 가속 · Space 점프/집게 해제 · E 집게 잡기/해제 · Shift/K 대시 · R 체크포인트 · F1 경로 · F2 검증표</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 4차 실제 게임 화면"></canvas>
    <section class="notes"><strong>4차 목표:</strong> 3차 수직축의 화면 중심·이전 구역 노출·상단 출구 겹침을 수정하고, 낭떠러지 위 다섯 집게를 하나의 경로로 연결하는 실제 진자 이동 구역을 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass04"></script>
</body>
</html>
