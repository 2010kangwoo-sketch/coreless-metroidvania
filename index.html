<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05070b">
  <title>Coreless · Rebuild 40-pass 08</title>
  <link rel="stylesheet" href="style.css?v=rebuild-pass08">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">CORELESS REBUILD · 40-PASS</p>
        <h1>8차 — 추격 준비·가속 구간</h1>
      </div>
      <div class="status-box">
        <span id="buildStatus">실행 준비 중…</span>
        <span id="auditStatus">검증 대기</span>
      </div>
    </header>
    <p class="controls">A/D 이동·스윙 가속 · Space 점프/집게 해제 · E 집게 · J/X 근접 공격 · Shift/K 대시 · 밟기 · R 체크포인트 · F1 경로 · F2 검증표 · F8 8차 검사</p>
    <canvas id="gameCanvas" width="1200" height="680" tabindex="0" aria-label="Coreless 재제작 8차 실제 게임 화면"></canvas>
    <section class="notes"><strong>8차 목표:</strong> 7차의 적 겹침·접촉 피해 수정 상태를 유지하고, 장거리 붕괴석 추격전에 들어가기 전 단일 경사 경로, 세 단계 가속, 장애물 회피와 짧은 실전 추격을 구현합니다.</section>
  </main>
  <script src="src/main.js?v=rebuild-pass07"></script>
  <script src="src/pass08.js?v=rebuild-pass08"></script>
